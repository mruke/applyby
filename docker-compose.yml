services:
  postgres:
    image: postgres:17
    container_name: applyby-postgres
    environment:
      POSTGRES_DB: applyby
      POSTGRES_USER: applyby
      POSTGRES_PASSWORD: applyby
    ports:
      - "5432:5432"
    volumes:
      - applyby-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applyby -d applyby"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  applyby-postgres-data: